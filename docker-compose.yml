services:
  postgres:
    image: postgres:16
    container_name: backforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: backforge
      POSTGRES_PASSWORD: backforge
      POSTGRES_DB: backforge
    ports:
      - "5432:5432"
    volumes:
      - backforge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backforge -d backforge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  backforge_postgres_data:

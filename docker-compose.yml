services:
  postgres:
    image: postgres:16
    container_name: localbase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: localbase
      POSTGRES_PASSWORD: localbase
      POSTGRES_DB: localbase
    ports:
      - "5432:5432"
    volumes:
      - localbase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localbase -d localbase"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  localbase_postgres_data:
